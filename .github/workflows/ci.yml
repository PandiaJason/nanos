name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            nanos-core-agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build main crate
        run: cargo build

      - name: Build nanos-core-agent (wasm)
        run: cargo build --target wasm32-unknown-unknown
        working-directory: nanos-core-agent

      - name: Test main crate
        run: cargo test

      - name: Test nanos-core-agent
        run: cargo test
        working-directory: nanos-core-agent
